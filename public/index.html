<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>市场情绪监控看板</title>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root { --bg:#0b1020; --card:#121a31; --text:#e8edff; --muted:#97a3c6; --up:#22c55e; --down:#ef4444; --line:#60a5fa; }
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#0b1020,#101a3a);color:var(--text);font-family:Inter,system-ui,Arial}
    .wrap{max-width:1280px;margin:24px auto;padding:0 16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    h1{font-size:24px;margin:0}
    .muted{color:var(--muted);font-size:13px}
    .card{background:rgba(18,26,49,.88);border:1px solid rgba(151,163,198,.18);border-radius:14px;padding:14px;backdrop-filter: blur(8px)}
    .row{display:flex;justify-content:space-between;align-items:center}
    .delta.up{color:var(--up)} .delta.down{color:var(--down)}
    .hl{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(151,163,198,.25)}
    .hl a{color:#93c5fd;text-decoration:none}
    .hl a:hover{text-decoration:underline}
    .tab{background:#1b2648;color:#dbe5ff;border:1px solid rgba(151,163,198,.3);padding:6px 10px;border-radius:9px;cursor:pointer;font-size:13px}
    .tab.active{background:#2563eb;border-color:#3b82f6}
    .news{display:flex;gap:10px;margin:8px 0}
    .news img{width:72px;height:48px;object-fit:cover;border-radius:6px;border:1px solid rgba(151,163,198,.25)}
    .overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:8px}
    .ov{padding:8px 10px;border-radius:10px;border:1px solid rgba(151,163,198,.25);background:rgba(17,24,46,.7);cursor:pointer;font-size:12px;line-height:1.35}
    .ov.active{border-color:#3b82f6;background:rgba(37,99,235,.18)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>市场情绪监控看板</h1>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label class="muted" style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input id="beginnerToggle" type="checkbox" checked /> 新手模式
        </label>
        <div class="muted" id="meta">加载中...</div>
      </div>
    </div>
    <div id="summaryHero" class="card" style="margin-top:14px"></div>
    <div id="dailyBrief" class="card" style="margin-top:10px"></div>
    <div id="overview" class="overview"></div>
    <div id="tabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px"></div>
    <div id="panel" style="margin-top:8px"></div>
  </div>

<script>
let charts = {};
let current = 'crypto';
let sectorsCache = {};
let beginnerMode = localStorage.getItem('beginnerMode') !== 'off';
let proDetailsExpanded = false;

function titleOf(k){ return ({crypto:'加密 / Polymarket',macro:'宏观经济',tech_ai:'AI / 科技',geopolitics:'地缘政治'})[k] || k; }

function parseTs(v){
  const t = Date.parse(v);
  return Number.isFinite(t) ? Math.floor(t/1000) : Math.floor(Date.now()/1000);
}

function renderTabs(keys){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = keys.map(k => `<button class="tab ${k===current?'active':''}" data-k="${k}">${titleOf(k)}</button>`).join('');
  tabs.querySelectorAll('button').forEach(b => b.onclick = () => { current = b.dataset.k; renderPanel(); renderTabs(keys); });
}

function scoreBand(v){
  const n = Number(v || 0);
  if (n >= 5) return { label: '重度偏多', color: '#16a34a' };
  if (n >= 2) return { label: '中度偏多', color: '#22c55e' };
  if (n >= 0.5) return { label: '轻度偏多', color: '#86efac' };
  if (n > -0.5) return { label: '中性', color: '#93c5fd' };
  if (n >= -2) return { label: '轻度偏空', color: '#fca5a5' };
  if (n >= -5) return { label: '中度偏空', color: '#f87171' };
  return { label: '重度偏空', color: '#ef4444' };
}

function topItems(mapObj, n=3){
  return Object.entries(mapObj).sort((a,b)=>b[1]-a[1]).slice(0,n).map(x=>x[0]);
}

function buildExplanation(data){
  const recentBars = (data.kline || []).slice(-12); // 约近1小时（5分钟桶）
  const prevBars = (data.kline || []).slice(-24, -12);

  const countDir = (bars) => bars.reduce((acc, b) => {
    const plus = b.analysis?.plus || [];
    const minus = b.analysis?.minus || [];
    acc.pos += plus.length;
    acc.neg += minus.length;
    acc.news += Number(b.analysis?.newsCount || 0);
    plus.forEach(k => acc.plusMap[k] = (acc.plusMap[k] || 0) + 1);
    minus.forEach(k => acc.minusMap[k] = (acc.minusMap[k] || 0) + 1);
    return acc;
  }, { pos:0, neg:0, news:0, plusMap:{}, minusMap:{} });

  const now = countDir(recentBars);
  const prev = countDir(prevBars);
  const topPlus = topItems(now.plusMap, 3);
  const topMinus = topItems(now.minusMap, 3);

  const plusMax = Math.max(0, ...Object.values(now.plusMap));
  const minusMax = Math.max(0, ...Object.values(now.minusMap));
  const keywordTotal = now.pos + now.neg;
  const topConcentration = keywordTotal ? Math.max(plusMax, minusMax) / keywordTotal : 0;

  const impactNews = ((data.highlights || []).at(-1)?.reasons || []).slice(0,3);
  const signalDelta = (now.pos - now.neg) - (prev.pos - prev.neg);
  const trendText = signalDelta > 1 ? '驱动增强' : signalDelta < -1 ? '驱动减弱' : '驱动持平';

  return {
    posCount: now.pos,
    negCount: now.neg,
    topPlus,
    topMinus,
    impactNews,
    trendText,
    nowNews: now.news,
    prevNews: prev.news,
    topConcentration
  };
}

function getLinkageAdvice(currentSector, nt, explanation){
  const plans = {
    geopolitics: {
      first: 'macro',
      second: 'crypto',
      chain: '地缘政治 → 宏观预期 → 加密避险交易',
      whyFirst: '先确认利率/通胀预期是否被事件推高',
      whySecond: '再看避险情绪是否传导到加密市场'
    },
    macro: {
      first: 'tech_ai',
      second: 'crypto',
      chain: '宏观预期 → 科技估值情绪 → 加密风险偏好',
      whyFirst: '先看科技板块是否同步放大',
      whySecond: '再看加密是否跟随风险偏好变化'
    },
    crypto: {
      first: 'macro',
      second: 'geopolitics',
      chain: '加密风险偏好 → 宏观流动性预期 → 地缘风险共振',
      whyFirst: '先确认流动性预期是否支持当前波动',
      whySecond: '再看是否有地缘事件放大情绪'
    },
    tech_ai: {
      first: 'macro',
      second: 'crypto',
      chain: '科技情绪变化 → 宏观风险偏好 → 加密交易热度',
      whyFirst: '先看宏观预期是否同向',
      whySecond: '再看加密交易热度是否跟涨/跟跌'
    }
  };

  const base = plans[currentSector] || plans.crypto;
  const signalGap = Math.abs((explanation.posCount || 0) - (explanation.negCount || 0));
  const isConflict = signalGap <= 1;
  const lowConcentration = (explanation.topConcentration || 0) < 0.35;

  // 规则1：仅初步趋势/强趋势给“先看A再看B”
  if (nt.label === '短期噪音') {
    return {
      ...base,
      mode: 'observe',
      triggerText: '触发条件：当前为短期噪音，仅给观察建议。',
      action: '分歧中，先观察1个周期，不做板块联动判断。'
    };
  }

  // 规则3：信号冲突优先降级
  if (isConflict) {
    return {
      ...base,
      mode: 'observe',
      triggerText: '触发条件：正负信号接近，当前分歧中。',
      action: '分歧中，先观察1个周期；若下一周期仍同向再联动。'
    };
  }

  // 规则2：关键词集中度不足降级为候选Top2
  if (lowConcentration) {
    return {
      ...base,
      mode: 'candidate',
      triggerText: '触发条件：主导关键词集中度不足，降级为候选Top2。',
      action: `候选联动：${titleOf(base.first)} / ${titleOf(base.second)}，先看哪个先出现同向信号。`
    };
  }

  const action = nt.label === '强趋势'
    ? '先看A确认延续，再看B是否同步放大；同向则提高置信度。'
    : '先看A确认方向，再看B是否跟随；同向再提升置信度。';

  return {
    ...base,
    mode: 'link',
    triggerText: '触发条件：趋势成立且关键词集中，可按联动顺序跟踪。',
    action
  };
}

function renderPanel(){   
  const data = sectorsCache[current];
  if (!data) return;
  const deltaClass = data.change >= 0 ? 'up' : 'down';
  const deltaSign = data.change >= 0 ? '+' : '';
  const latestHighlights = (data.highlights || []).slice(-3).reverse();
  const band = scoreBand(data.sentimentNow ?? 0);

  const explanation = buildExplanation(data);
  const nt = classifyNoiseTrend(data);
  const showDetails = !beginnerMode || proDetailsExpanded;
  const linkage = getLinkageAdvice(current, nt, explanation);
  const oneHourChange = Number(data.change || 0);
  const confidenceScore = Math.min(1, (Math.min(1, (explanation.nowNews || 0) / 20) * 0.6) + ((nt.label === '强趋势' ? 1 : nt.label === '初步趋势' ? 0.6 : 0.3) * 0.4));
  const confidenceTag = confidenceLabel(confidenceScore);
  const changeText = `${oneHourChange >= 0 ? '+' : ''}${oneHourChange.toFixed(2)}`;
  const newsLevel = (explanation.nowNews || 0) >= 18 ? '高' : (explanation.nowNews || 0) >= 8 ? '中' : '低';
  const volLevel = Math.abs(oneHourChange) >= 2 ? '高' : Math.abs(oneHourChange) >= 0.8 ? '中' : '低';
  const trendTip = `判定依据：连续性${nt.continuity}、新闻量${newsLevel}、跨源一致性${nt.sourceConsistency}、波动幅度${volLevel}。`;
  const trendHuman = nt.label === '短期噪音' ? '当前更像短期噪音。' : nt.label === '初步趋势' ? '当前为初步趋势，仍待确认。' : '当前为强趋势，但需警惕反向信号。';
  const explainNews = (explanation.impactNews || []).map(n => `• <a href="${n.url}" target="_blank">${n.title}</a>（${n.source || '未知来源'}）`).join('<br>') || '• 暂无高影响新闻样本';
  const briefReason = `简析：${explanation.negCount > explanation.posCount ? '负面信号占优' : explanation.posCount > explanation.negCount ? '正面信号占优' : '多空接近'}，${explanation.trendText}。`;

  const explanationHTML = `
    <div class="row"><strong>为什么变化（近1小时） ${beginnerMode ? '· 先看这里③' : ''}</strong><span style="padding:2px 8px;border-radius:999px;border:1px solid rgba(151,163,198,.35)">${nt.label}</span></div>
    <div class="muted" style="margin-top:8px;line-height:1.55">
      <div><strong>① 多空对比：</strong>正向${explanation.posCount}条，负向${explanation.negCount}条；${explanation.trendText}。</div>
      <div><strong>② 主导关键词：</strong>+${explanation.topPlus.slice(0,2).join('、') || '无'} / -${explanation.topMinus.slice(0,2).join('、') || '无'}。</div>
      <div><strong>③ 样本变化：</strong>上一小时${explanation.prevNews}条 → 当前${explanation.nowNews}条。</div>
      <div><strong>④ 下一步观察：</strong>${nt.nextWatch}</div>
    </div>`;

  const evidencePool = dedupeNews(latestHighlights.flatMap(h => (h.reasons || []).map(r => ({ ...r, delta: Number(h.delta || 0), hTime: h.time }))));
  const scoredEvidence = evidencePool.map(r => {
    const posN = (r.scoreBasis?.pos || []).length;
    const negN = (r.scoreBasis?.neg || []).length;
    const dir = posN > negN ? '偏多' : posN < negN ? '偏空' : '中性';
    const directionMatch = (r.delta >= 0 && dir === '偏多') || (r.delta < 0 && dir === '偏空');
    const score = (directionMatch ? 2 : 0) + Math.min(2, Math.abs(Number(r.delta || 0)));
    return { ...r, dir, directionMatch, score };
  }).sort((a,b) => b.score - a.score);

  const strongest = scoredEvidence[0];
  const top3 = scoredEvidence.slice(0,3);
  const rest = scoredEvidence.slice(3);
  const strongestTag = strongest ? (strongest.directionMatch ? '方向一致' : '高权重') : '';

  const strongestHTML = strongest ? `
    <div class="hl">
      <div><strong>最强证据</strong> <span class="muted">（${strongestTag}）</span></div>
      <div style="margin-top:6px">• <a href="${strongest.url}" target="_blank">${strongest.title}</a></div>
      <div class="muted" style="margin-top:4px">来源：${strongest.source || '未知'} ｜ 时间：${String(strongest.seen || strongest.hTime || '').replace('T',' ').slice(0,16)} ｜ 影响方向：${strongest.dir}</div>
    </div>` : '<div class="hl muted">暂无可用证据</div>';

  const top3Fold = showDetails && top3.length > 1 ? `
    <details class="hl" style="margin-top:6px">
      <summary style="cursor:pointer">查看Top3（其余证据）</summary>
      ${top3.slice(1).map(r => `<div style="margin-top:6px">• <a href="${r.url}" target="_blank">${r.title}</a><br><span class="muted">来源：${r.source || '未知'} ｜ 时间：${String(r.seen || r.hTime || '').replace('T',' ').slice(0,16)} ｜ 影响方向：${r.dir}</span></div>`).join('')}
    </details>` : '';

  const allFold = showDetails && rest.length ? `
    <details class="hl" style="margin-top:6px">
      <summary style="cursor:pointer">查看全部证据</summary>
      ${scoredEvidence.map(r => `<div style="margin-top:6px">• <a href="${r.url}" target="_blank">${r.title}</a><br><span class="muted">来源：${r.source || '未知'} ｜ 时间：${String(r.seen || r.hTime || '').replace('T',' ').slice(0,16)} ｜ 影响方向：${r.dir}</span></div>`).join('')}
    </details>` : '';

  const highlightHTML = `${strongestHTML}${top3Fold}${allFold}`;

  document.getElementById('panel').innerHTML = `
    <div class="card">
      <div class="row"><strong>${titleOf(current)}</strong><span class="delta ${deltaClass}">${deltaSign}${data.change}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        <span style="padding:3px 8px;border-radius:999px;border:1px solid rgba(151,163,198,.35)">情绪值 ${Number(data.sentimentNow ?? 0).toFixed(2)}</span>
        <span style="padding:3px 8px;border-radius:999px;border:1px solid rgba(151,163,198,.35);color:${band.color}">等级 ${band.label}</span>
        <span style="padding:3px 8px;border-radius:999px;border:1px solid rgba(151,163,198,.35);color:${oneHourChange>=0?'#22c55e':'#ef4444'}">1h变化 ${changeText}</span>
        <span style="padding:3px 8px;border-radius:999px;border:1px solid rgba(151,163,198,.35)" title="${trendTip}">趋势 ${nt.label} ⓘ</span>
        <span style="padding:3px 8px;border-radius:999px;border:1px solid rgba(151,163,198,.35)">可信度 ${confidenceTag}</span>
      </div>
      <div class="muted" style="margin-top:4px">趋势说明：${trendHuman}</div>
      <div id="chart_one" style="height:280px;margin-top:8px"></div>
      ${showDetails ? `<div class="muted" style="margin-top:6px">图例：中线=0 ｜ 当前值=${Number(data.sentimentNow ?? 0).toFixed(2)}</div>` : ''}
      <div class="muted" style="margin-top:6px">${briefReason}</div>
      ${beginnerMode ? `<button id="toggle_pro" class="tab" style="margin-top:6px">${showDetails ? '收起专业细节' : '展开专业细节'}</button>` : ''}
      <details class="hl" style="margin-top:6px" ${showDetails ? 'open' : ''}>
        <summary style="cursor:pointer">展开详细原因</summary>
        ${explanationHTML}
      </details>
      <div id="bar_explain" class="hl muted">${beginnerMode ? '先看这里④：点击或悬浮 K 线柱，直接看“这根K线为什么动”。' : '点击或悬浮 K 线柱，查看“这根K线为什么动”。'}</div>
      ${highlightHTML}
    </div>`;

  const toggleBtn = document.getElementById('toggle_pro');
  if (toggleBtn) {
    toggleBtn.onclick = () => {
      proDetailsExpanded = !proDetailsExpanded;
      renderPanel();
    };
  }

  drawOne(data);
}

function confidenceLabel(score){
  if (score >= 0.67) return '高';
  if (score >= 0.34) return '中';
  return '低';
}

function directionLabel(v){
  if (v >= 0.8) return '偏多';
  if (v <= -0.8) return '偏空';
  return '中性';
}

function trendLabel(v){
  if (v >= 0.8) return '走强';
  if (v <= -0.8) return '走弱';
  return '震荡';
}

function classifyNoiseTrend(data){
  const bars = (data.kline || []).slice(-12);
  const dirs = bars.map(b => Number((b.close || 0) - (b.open || 0))).filter(v => v !== 0);
  const sameDir = dirs.length ? Math.max(dirs.filter(v=>v>0).length, dirs.filter(v=>v<0).length) / dirs.length : 0;

  const sampleCount = bars.reduce((s,b)=>s + Number(b.analysis?.newsCount || 0), 0);
  const sampleScore = Math.min(1, sampleCount / 30);

  const reasons = ((data.highlights || []).at(-1)?.reasons || []).slice(0,3);
  const srcSet = new Set(reasons.map(r => (r.source || '').trim()).filter(Boolean));
  const sourceScore = reasons.length ? (srcSet.size / reasons.length) : 0;

  const score = sameDir * 0.45 + sampleScore * 0.35 + sourceScore * 0.2;
  let label = '短期噪音';
  if (score >= 0.7) label = '强趋势';
  else if (score >= 0.4) label = '初步趋势';

  const continuity = sameDir >= 0.66 ? '高' : sameDir >= 0.4 ? '中' : '低';
  const sourceConsistency = sourceScore >= 0.66 ? '高' : sourceScore >= 0.4 ? '中' : '低';

  let nextWatch = '建议再观察1~2个周期，确认方向是否持续。';
  if (label === '初步趋势') nextWatch = '建议重点观察主导关键词是否延续、来源是否继续扩散。';
  if (label === '强趋势') nextWatch = '建议重点盯反向高权重新闻，判断是否出现拐点信号。';

  return { label, continuity, sampleCount, sourceConsistency, nextWatch };
}

function renderSummary(sectors){ 
  const hero = document.getElementById('summaryHero');
  const entries = Object.entries(sectors || {});
  if (!entries.length) {
    hero.innerHTML = `<strong>一句话总结</strong><div class="muted" style="margin-top:6px">暂时没有可用数据，请稍后刷新。</div>`;
    return;
  }

  const avgNow = entries.reduce((s, [,v]) => s + Number(v.sentimentNow || 0), 0) / entries.length;
  const avgChange = entries.reduce((s, [,v]) => s + Number(v.change || 0), 0) / entries.length;
  const reason = entries
    .map(([k,v]) => ({ sector: k, absChange: Math.abs(Number(v.change || 0)), news: (v.articles || []).length, error: v.error, data: v }))
    .sort((a,b) => b.absChange - a.absChange)[0];
  const trendTag = classifyNoiseTrend(reason?.data || {}).label;

  const consistency = Math.min(1, Math.abs(avgChange) / 2.5);
  const sampleScore = Math.min(1, ((reason?.news || 0) / 20));
  const sourceOk = reason?.error ? 0.2 : 1;
  const conf = confidenceLabel((consistency * 0.45) + (sampleScore * 0.35) + (sourceOk * 0.2));

  hero.innerHTML = `
    <div class="row"><strong>市场一句话 ${beginnerMode ? '· 先看这里①' : ''}</strong><span class="muted">${trendTag}</span></div>
    <div style="margin-top:6px;line-height:1.45">
      当前<strong>${directionLabel(avgNow)}</strong>，近1小时<strong>${trendLabel(avgChange)}</strong>；主因：<strong>${titleOf(reason?.sector || 'crypto')}</strong>，可信度<strong>${conf}</strong>。
    </div>
  `;
}

function renderDailyBrief(sectors){
  const box = document.getElementById('dailyBrief');
  const entries = Object.entries(sectors || {});
  if (!box) return;
  if (!entries.length) {
    box.innerHTML = `<strong>今日摘要（基于当前样本）</strong><div class="muted" style="margin-top:6px">暂无足够样本，先关注当前主导板块与下一周期变化。</div>`;
    return;
  }

  const strongest = [...entries].sort((a,b)=>Number(b[1].sentimentNow||0)-Number(a[1].sentimentNow||0))[0];
  const weakest = [...entries].sort((a,b)=>Number(a[1].sentimentNow||0)-Number(b[1].sentimentNow||0))[0];

  let maxEvent = null;
  for (const [, sec] of entries) {
    for (const h of (sec.highlights || [])) {
      if (!maxEvent || Math.abs(Number(h.delta||0)) > Math.abs(Number(maxEvent.delta||0))) {
        maxEvent = h;
      }
    }
  }

  const topReason = maxEvent?.reasons?.[0];
  const nextWatch = `优先看 ${titleOf(strongest[0])} 是否延续，再对照 ${titleOf(weakest[0])} 是否出现反向信号。`;

  box.innerHTML = `
    <details>
      <summary style="cursor:pointer;list-style:none"><strong>今日摘要（基于当前样本）</strong> <span class="muted">（默认折叠）</span></summary>
      <div class="muted" style="margin-top:8px;line-height:1.7">
        最强板块：<strong>${titleOf(strongest[0])}</strong>（情绪值 ${Number(strongest[1].sentimentNow || 0).toFixed(2)}）<br>
        最弱板块：<strong>${titleOf(weakest[0])}</strong>（情绪值 ${Number(weakest[1].sentimentNow || 0).toFixed(2)}）<br>
        最大波动：${topReason ? `${topReason.title}（${topReason.source || '未知来源'}）` : '暂无显著波动事件样本'}<br>
        下一步关注：${nextWatch}
      </div>
    </details>`;
}

function renderOverview(sectors){
  const box = document.getElementById('overview');
  const entries = Object.entries(sectors || {});
  if (!box) return;
  if (!entries.length) { box.innerHTML = ''; return; }

  const sorted = [...entries].sort((a,b)=>Number(b[1].sentimentNow||0)-Number(a[1].sentimentNow||0));
  const strongest = sorted[0]?.[0];
  const weakest = sorted.at(-1)?.[0];

  box.innerHTML = entries.map(([k,v]) => {
    const ex = buildExplanation(v);
    const nt = classifyNoiseTrend(v).label;
    const reason = ex.topPlus[0] ? `偏多：${ex.topPlus[0]}` : ex.topMinus[0] ? `偏空：${ex.topMinus[0]}` : '信号分歧';
    const mark = k === strongest ? '🏆最强' : k === weakest ? '⚠最弱' : '';
    return `<div class="ov ${k===current?'active':''}" data-k="${k}">
      <div class="row"><strong>${titleOf(k)}</strong><span class="muted">${mark}</span></div>
      <div>情绪 ${Number(v.sentimentNow||0).toFixed(2)} ｜ 1h ${Number(v.change||0)>=0?'+':''}${Number(v.change||0).toFixed(2)}</div>
      <div class="muted">${nt} · ${reason}</div>
    </div>`;
  }).join('');

  box.querySelectorAll('.ov').forEach(el => {
    el.onclick = () => {
      current = el.dataset.k;
      renderOverview(sectorsCache);
      renderTabs(Object.keys(sectorsCache));
      renderPanel();
    };
  });
}

function dedupeNews(items = []) {
  const seen = new Set();
  const out = [];
  for (const it of items) {
    const key = `${(it.url || '').trim()}|${(it.title || '').trim().toLowerCase()}`;
    if (!key || seen.has(key)) continue;
    seen.add(key);
    out.push(it);
  }
  return out;
}

function explainSentence(meta = {}) {
  const plus = (meta.plus || []).length;
  const minus = (meta.minus || []).length;
  if (plus - minus >= 1) return '正面关键词集中，推动上行。';
  if (minus - plus >= 1) return '负面关键词集中，导致下探。';
  return '多空信号混合，价格偏震荡。';
}

function drawOne(data){ 
  const el = document.getElementById('chart_one');
  if(!el) return;
  el.style.position = 'relative';
  const detailMap = new Map((data.kline || []).slice(-80).map(x => [parseTs(x.time), x.analysis || {}]));
  const articleMap = new Map();
  for (const a of (data.articles || [])) {
    const t = new Date(a.pubDate || Date.now());
    const min = Math.floor(t.getUTCMinutes() / 5) * 5;
    t.setUTCMinutes(min, 0, 0);
    const key = Math.floor(t.getTime() / 1000);
    const arr = articleMap.get(key) || [];
    arr.push({
      title: a.titleZh || a.title,
      source: a.source || 'unknown',
      url: a.url,
      time: a.pubDate || ''
    });
    articleMap.set(key, arr);
  }
  const raw = (data.kline || []).slice(-80).map(x => ({ time: parseTs(x.time), open:+x.open, high:+x.high, low:+x.low, close:+x.close }));
  if (charts.one?.remove) charts.one.remove();
  const chart = LightweightCharts.createChart(el, {
    layout: { background: { color: 'transparent' }, textColor: '#97a3c6' },
    grid: { vertLines: { color: 'rgba(151,163,198,.12)' }, horzLines: { color: 'rgba(151,163,198,.12)' } },
    rightPriceScale: { borderVisible: false }, timeScale: { borderVisible: false, timeVisible: true }, width: el.clientWidth, height: 280
  });
  const series = chart.addCandlestickSeries({ upColor:'#22c55e', downColor:'#ef4444', borderVisible:false, wickUpColor:'#22c55e', wickDownColor:'#ef4444' });
  series.setData(raw);
  const midline = chart.addLineSeries({ color:'rgba(151,163,198,.45)', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false });
  midline.setData(raw.map(x => ({ time: x.time, value: 0 })));
  chart.timeScale().fitContent();

  const tip = document.createElement('div');
  tip.style.cssText = 'position:absolute;right:8px;top:8px;background:#0b1020cc;border:1px solid #2b3f74;padding:8px;border-radius:8px;font-size:12px;color:#dbe5ff;max-width:52%;pointer-events:none';
  tip.innerHTML = '悬浮柱子查看涨跌解析';
  el.appendChild(tip);

  const explainEl = document.getElementById('bar_explain');
  let lockedTime = null;

  function renderBarExplain(t, d) {
    if (!explainEl || !t || !d) return;
    const meta = detailMap.get(t) || {};
    const change = (d.close - d.open).toFixed(2);
    const news = dedupeNews((articleMap.get(t) || [])).slice(0, 3);
    const newsHtml = news.length
      ? news.map(n => `• <a href="${n.url}" target="_blank">${n.title}</a>（${n.source}｜${(n.time || '').replace('T', ' ').slice(0,16)}）`).join('<br>')
      : '• 当前时间点未命中证据新闻，建议查看相邻时间点。';

    const delta = Number(change);
    const move = delta > 0.05 ? '上涨' : delta < -0.05 ? '下跌' : '震荡';
    const plusN = (meta.plus || []).length;
    const minusN = (meta.minus || []).length;
    const bias = plusN > minusN ? '偏多' : plusN < minusN ? '偏空' : '中性';
    tip.innerHTML = `这根K：${move}（Δ${change}）<br>当时新闻：${meta.newsCount || 0}条<br>市场倾向：${bias}`;
    explainEl.innerHTML = `<div><strong>这根K线为什么动</strong></div>
      <div class="muted" style="margin-top:6px;line-height:1.6">${explainSentence(meta)}（Δ${change}）</div>
      <div class="muted" style="margin-top:6px">证据新闻（去重后 Top3）：</div>
      <div style="margin-top:4px;line-height:1.6">${newsHtml}</div>`;
  }

  chart.subscribeCrosshairMove(param => {
    if (lockedTime) return;
    const d = param?.seriesData?.get(series);
    if (!d || !param.time) return;
    renderBarExplain(Number(param.time), d);
  });

  chart.subscribeClick(param => {
    const d = param?.seriesData?.get(series);
    if (!d || !param.time) {
      lockedTime = null;
      return;
    }
    const t = Number(param.time);
    lockedTime = lockedTime === t ? null : t;
    renderBarExplain(t, d);
  });
  charts.one = chart;
}

function applyBeginnerMode(){
  const t = document.getElementById('beginnerToggle');
  if (t) t.checked = beginnerMode;
  localStorage.setItem('beginnerMode', beginnerMode ? 'on' : 'off');
}

async function refresh(){
  const res = await fetch('/api/data');
  const data = await res.json();
  document.getElementById('meta').textContent = `每5分钟自动更新 ｜ 最后更新：${data.updatedAt || 'N/A'}`;
  sectorsCache = data.sectors || {};
  const keys = Object.keys(sectorsCache);
  renderSummary(sectorsCache);
  renderDailyBrief(sectorsCache);
  renderOverview(sectorsCache);
  if (!keys.includes(current)) current = keys[0];
  renderTabs(keys);
  renderPanel();
}

applyBeginnerMode();
document.getElementById('beginnerToggle')?.addEventListener('change', (e) => {
  beginnerMode = !!e.target.checked;
  if (!beginnerMode) proDetailsExpanded = true;
  applyBeginnerMode();
  renderSummary(sectorsCache);
  renderPanel();
});

refresh();
setInterval(refresh, 60 * 1000);
</script>
