<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>市场情绪监控看板</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root { --bg:#0b1020; --card:#121a31; --text:#e8edff; --muted:#97a3c6; --up:#22c55e; --down:#ef4444; --line:#60a5fa; }
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#0b1020,#101a3a);color:var(--text);font-family:Inter,system-ui,Arial}
    .wrap{max-width:1280px;margin:24px auto;padding:0 16px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    h1{font-size:24px;margin:0}
    .muted{color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:18px}
    .card{background:rgba(18,26,49,.88);border:1px solid rgba(151,163,198,.18);border-radius:14px;padding:14px;backdrop-filter: blur(8px)}
    .row{display:flex;justify-content:space-between;align-items:center}
    .delta.up{color:var(--up)} .delta.down{color:var(--down)}
    .hl{margin-top:10px;padding-top:10px;border-top:1px dashed rgba(151,163,198,.25)}
    .hl a{color:#93c5fd;text-decoration:none}
    .hl a:hover{text-decoration:underline}
    canvas{margin-top:10px;max-height:180px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>市场情绪监控看板</h1>
      <div class="muted" id="meta">加载中...</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

<script>
let charts = {};

function titleOf(k){ return ({crypto:'Crypto / Polymarket',macro:'宏观经济',tech_ai:'AI / 科技',geopolitics:'地缘政治'})[k] || k; }

function renderCard(name, data){
  const id = `c_${name}`;
  const deltaClass = data.change >= 0 ? 'up' : 'down';
  const deltaSign = data.change >= 0 ? '+' : '';

  const latestHighlights = (data.highlights || []).slice(-2).reverse();
  const highlightHTML = latestHighlights.length ? latestHighlights.map(h => `
    <div class="hl">
      <div class="muted">变动时点: ${h.time} ｜ Δ${h.delta}</div>
      ${(h.reasons || []).map(r => `<div>• <a href="${r.url}" target="_blank">${r.title}</a> <span class="muted">(${r.source})</span></div>`).join('')}
    </div>
  `).join('') : '<div class="hl muted">暂无显著变动新闻</div>';

  return `
    <div class="card">
      <div class="row">
        <strong>${titleOf(name)}</strong>
        <span class="delta ${deltaClass}">${deltaSign}${data.change}</span>
      </div>
      <div class="muted">当前情绪值: ${data.sentimentNow ?? 0}</div>
      <div id="${id}" style="height:180px;margin-top:10px"></div>
      ${highlightHTML}
    </div>
  `;
}

function parseTs(v){
  if (!v) return Math.floor(Date.now()/1000);
  const s = String(v);
  if (/^\d{14}$/.test(s)) {
    const y=s.slice(0,4), m=s.slice(4,6), d=s.slice(6,8), hh=s.slice(8,10), mm=s.slice(10,12), ss=s.slice(12,14);
    return Math.floor(new Date(`${y}-${m}-${d}T${hh}:${mm}:${ss}Z`).getTime()/1000);
  }
  const t = Date.parse(s);
  return Number.isFinite(t) ? Math.floor(t/1000) : Math.floor(Date.now()/1000);
}

function draw(name, data){
  const id = `c_${name}`;
  const el = document.getElementById(id);
  if(!el) return;

  const raw = (data.kline || []).slice(-60).map(x => ({
    time: parseTs(x.time),
    open: Number(x.open ?? x.close ?? 0),
    high: Number(x.high ?? x.close ?? 0),
    low: Number(x.low ?? x.close ?? 0),
    close: Number(x.close ?? 0)
  }));

  if (charts[id]?.remove) charts[id].remove();
  const chart = LightweightCharts.createChart(el, {
    layout: { background: { color: 'transparent' }, textColor: '#97a3c6' },
    grid: { vertLines: { color: 'rgba(151,163,198,.12)' }, horzLines: { color: 'rgba(151,163,198,.12)' } },
    rightPriceScale: { borderVisible: false },
    timeScale: { borderVisible: false, timeVisible: true, secondsVisible: false },
    crosshair: { mode: 1 },
    width: el.clientWidth,
    height: 180
  });

  const series = chart.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444', borderVisible: false,
    wickUpColor: '#22c55e', wickDownColor: '#ef4444'
  });
  series.setData(raw);
  chart.timeScale().fitContent();

  charts[id] = chart;
}

async function refresh(){
  const res = await fetch('/api/data');
  const data = await res.json();
  document.getElementById('meta').textContent = `每5分钟自动更新 ｜ 最后更新: ${data.updatedAt || 'N/A'}`;

  const sectors = data.sectors || {};
  const grid = document.getElementById('grid');
  grid.innerHTML = Object.entries(sectors).map(([k,v]) => renderCard(k,v)).join('');
  Object.entries(sectors).forEach(([k,v]) => draw(k,v));
}

refresh();
setInterval(refresh, 60 * 1000);
</script>
</body>
</html>
